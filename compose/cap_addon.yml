services:
  web:
    security_opt:
      - apparmor=unconfined
    cap_add:
      - CAP_SYS_ADMIN
  core:
    security_opt:
      - apparmor=${CORE_APPARMOR_POLICY:-unconfined}
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - 'c 189:* rmw'

  celery:
    volumes:
      - /dev/bus/usb:/dev/bus/usb
    device_cgroup_rules:
      - 'c 189:* rmw'